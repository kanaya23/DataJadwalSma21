<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Interaktif - SMAN 21 Bekasi</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>SEKOLAH MENENGAH ATAS NEGERI 21 BEKASI</h1>
            <p id="header-subtitle">JADWAL PELAJARAN SEMESTER GANJIL 2026 / 2027</p>
        </header>

        <section class="controls">
            <div class="control-group">
                <label for="shift-mode">SHIFT:</label>
                <select id="shift-mode">
                    <option value="pagi">Pagi</option>
                    <option value="siang" selected>Siang</option>
                </select>
            </div>
            <div class="control-group">
                <label for="view-mode">TAMPILKAN BERDASARKAN:</label>
                <select id="view-mode">
                    <option value="day" selected>Hari</option>
                    <option value="class">Kelas</option>
                    <option value="piket">Jadwal Piket</option>
                </select>
            </div>
            <div class="control-group" id="selector-group">
                <label for="selector" id="selector-label">PILIH HARI ATAU KELAS:</label>
                <select id="selector">
                    <!-- JS injects options here -->
                </select>
            </div>
            <div class="control-group theme-btn-group">
                <button id="theme-toggle" class="theme-btn">
                    <span class="theme-btn-text">TEMA: GELAP</span>
                </button>
            </div>
        </section>

        <main id="schedule-container" role="main">
            <!-- JS injects tables or cards here -->
        </main>

        <div id="tooltip" class="tooltip" aria-hidden="true" role="tooltip"></div>

        <footer class="footer">
            <p>Made by Bayumi A</p>
            <a href="https://github.com/kanaya23/DataJadwalSma21" target="_blank">Kontribusi Maintenance disini</a>
        </footer>
    </div>
    
    <!-- defer makes sure the DOM loads before the JS tries to grab elements -->
    <script src="app.js" defer></script>
</body>
</html>
