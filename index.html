<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Interaktif - SMAN 21 Bekasi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg-color: #f1f5f9;
      --container-bg: #ffffff;
      --primary-color: #1e3a8a;
      --primary-hover: #172554;
      --header-bg: #1e3a8a;
      --header-text: #ffffff;
      --border-color: #94a3b8;
      --hover-bg: #f1f5f9;
      --break-bg: #fef08a;
      --break-text: #854d0e;
      --text-color: #0f172a;
      --text-muted: #475569;
      --control-bg: #f8fafc;
      --card-bg: #ffffff;
      --card-border: #94a3b8;
      --shadow: none;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --transition-speed: 0.1s;
    }

    body.dark-theme {
      --bg-color: #0f172a;
      --container-bg: #1e293b;
      --primary-color: #38bdf8;
      --primary-hover: #7dd3fc;
      --header-bg: #1e3a8a;
      --header-text: #f8fafc;
      --border-color: #475569;
      --hover-bg: #334155;
      --break-bg: #3f3f2e;
      --break-text: #eab308;
      --text-color: #f1f5f9;
      --text-muted: #94a3b8;
      --control-bg: #1e293b;
      --card-bg: #1e293b;
      --card-border: #475569;
      --shadow: none;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      line-height: 1.5;
      transition: background-color var(--transition-speed), color var(--transition-speed);
    }

    .container {
      max-width: 1400px;
      margin: auto;
      background-color: var(--container-bg);
      padding: 25px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      position: relative;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
      border-bottom: 4px double var(--border-color);
      padding-bottom: 15px;
      position: relative;
    }

    .header h1 {
      margin: 0 0 5px 0;
      color: var(--primary-color);
      font-size: 24px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color var(--transition-speed);
    }

    .header p {
      margin: 0;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color var(--transition-speed);
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background-color: var(--control-bg);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      flex-wrap: wrap;
      align-items: center;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 250px;
    }

    .control-group label {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-color);
      white-space: nowrap;
      transition: color var(--transition-speed);
    }

    .control-group select {
      padding: 6px 10px;
      border: 1px solid var(--border-color);
      border-radius: 2px;
      font-size: 13px;
      font-family: var(--font-family);
      background-color: var(--container-bg);
      color: var(--text-color);
      width: 100%;
      box-sizing: border-box;
      cursor: pointer;
      transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
    }

    .control-group select:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .theme-btn-group {
      flex: 0 0 auto;
    }

    .theme-btn {
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: 2px;
      background-color: var(--container-bg);
      color: var(--text-color);
      font-family: var(--font-family);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 33px;
      transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
    }

    .theme-btn:hover {
      background-color: var(--hover-bg);
    }

    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border-color);
      margin-top: 15px;
      transition: border-color var(--transition-speed);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    caption {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-color);
      padding: 8px 0;
      caption-side: top;
      text-align: left;
      text-transform: uppercase;
      border-left: 4px solid var(--primary-color);
      padding-left: 10px;
      margin-bottom: 10px;
      transition: color var(--transition-speed);
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
      transition: border-color var(--transition-speed), background-color var(--transition-speed);
    }

    thead th {
      background-color: var(--header-bg);
      color: var(--header-text);
      font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody th {
      background-color: var(--control-bg);
      color: var(--text-color);
      font-weight: 700;
    }

    tbody td[data-code] {
      font-weight: 600;
    }

    tbody td[data-code]:hover {
      background-color: var(--hover-bg);
      cursor: pointer;
    }

    .break-row td, .event-row td {
      background-color: var(--break-bg);
      color: var(--break-text);
      font-weight: 700;
      font-style: italic;
      border-top: 2px solid var(--border-color);
      border-bottom: 2px solid var(--border-color);
      transition: background-color var(--transition-speed), color var(--transition-speed);
    }

    tbody th.day-header {
      background-color: var(--control-bg);
      color: var(--text-color);
      font-weight: 700;
      font-size: 13px;
      text-align: center;
      padding: 10px;
      width: 80px;
      border-right: 2px solid var(--border-color);
    }

    .tooltip {
      position: absolute;
      padding: 8px 12px;
      background-color: #0f172a;
      color: #ffffff;
      border: 1px solid #334155;
      border-radius: 2px;
      font-size: 12px;
      z-index: 1000;
      pointer-events: none;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      display: none;
      box-sizing: border-box;
    }

    body.dark-theme .tooltip {
      background-color: #1e293b;
      color: #f8fafc;
      border: 1px solid #475569;
    }

    .schedule-cards {
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color var(--transition-speed), border-color var(--transition-speed);
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      
      .container {
        padding: 15px;
      }

      /* Mobile Sizing for Tables to Prevent Squeezing */
      table {
        table-layout: auto !important;
      }

      th, td {
        padding: 6px 4px !important;
        font-size: 10px !important;
      }

      thead th {
        font-size: 10px !important;
      }

      .class-view-table th:nth-child(1) { width: 50px !important; } /* Hari */
      .class-view-table th:nth-child(2) { width: 30px !important; } /* Jam Ke- */
      .class-view-table th:nth-child(3) { width: 75px !important; } /* Waktu */
      .class-view-table th:nth-child(4) { width: auto !important; } /* Mata Pelajaran */
      .class-view-table th:nth-child(5) { width: auto !important; } /* Guru */

      .piket-table th:nth-child(1) { width: 80px !important; } /* Petugas Piket */
      
      .header h1 {
        font-size: 16px;
      }
      
      .header p {
        font-size: 11px;
      }
      
      .controls {
        padding: 12px;
        gap: 12px;
        flex-direction: column;
        align-items: stretch;
      }
      
      .control-group {
        flex: 1 1 100%;
        flex-direction: column;
        align-items: stretch;
        gap: 5px;
      }
      
      .theme-btn-group {
        align-self: center;
        margin-top: 5px;
      }
      
      #schedule-container table.day-view-table {
        display: none;
      }
      
      #schedule-container .table-wrapper {
        border: none;
      }
      
      .schedule-cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        margin-top: 15px;
      }
      
      .class-card {
        background-color: var(--container-bg);
        border: 1px solid var(--border-color);
        border-radius: 2px;
        padding: 12px;
        transition: background-color var(--transition-speed), border-color var(--transition-speed);
      }
      
      .class-card h3 {
        margin: 0 0 10px 0;
        color: var(--primary-color);
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 4px;
        font-size: 14px;
        text-transform: uppercase;
        transition: color var(--transition-speed);
      }
      
      .card-period {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid var(--border-color);
        font-size: 12px;
        align-items: center;
        transition: border-color var(--transition-speed);
      }
      
      .card-period:last-child {
        border-bottom: none;
      }
      
      .card-period-time {
        font-weight: 600;
        color: var(--text-color);
      }
      
      .card-period-subject {
        font-weight: 700;
        text-align: right;
        display: flex;
        flex-direction: column;
      }
      
      .card-period-teacher {
        font-size: 10px;
        color: var(--text-muted);
        font-weight: 400;
        margin-top: 1px;
      }
      
      .tooltip {
        display: none !important;
      }
    }
  </style>
</head>

      <div class="control-group theme-btn-group">
        <button id="theme-toggle" class="theme-btn">
          <span class="theme-btn-text">TEMA: GELAP</span>
        </button>
      </div>
    </section>
    
    <main id="schedule-container" role="main">
      <!-- Dynamic Table or Cards -->
    </main>
    
    <div id="tooltip" class="tooltip" aria-hidden="true" role="tooltip"></div>
    
    <footer class="footer">
      <p style="margin-bottom: 5px; margin-top: 0;">Made by Bayumi A</p>

    const shiftModeSelect = document.getElementById('shift-mode');
    const viewModeSelect = document.getElementById('view-mode');
    const selectorSelect = document.getElementById('selector');
    const selectorGroup = document.getElementById('selector-group');
    const selectorLabel = document.getElementById('selector-label');
    const scheduleContainer = document.getElementById('schedule-container');
    const headerSubtitle = document.getElementById('header-subtitle');
    const themeToggleBtn = document.getElementById('theme-toggle');
    const tooltip = document.getElementById('tooltip');

    function updateThemeButtonText() {
      const btnText = themeToggleBtn.querySelector('.theme-btn-text');
      if (document.body.classList.contains('dark-theme')) {
        btnText.textContent = 'TEMA: TERANG';
      } else {
        btnText.textContent = 'TEMA: GELAP';
      }
    }

    // Theme Toggle Handler
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-theme');
      updateThemeButtonText();
    }

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-theme');
      if (document.body.classList.contains('dark-theme')) {
        localStorage.setItem('theme', 'dark');
      } else {
        localStorage.setItem('theme', 'light');
      }
      updateThemeButtonText();
    });

    // Populate the selector dropdown dynamically
    function populateSelector(restoreSelection = true) {
      const shift = shiftModeSelect.value;
      const viewMode = viewModeSelect.value;
      const prevVal = selectorSelect.value;
      
      selectorSelect.innerHTML = '';
      
      if (viewMode === 'day') {
        selectorGroup.style.display = 'flex';
        selectorLabel.innerText = 'PILIH HARI:';
        const days = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];
        days.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          selectorSelect.appendChild(opt);
        });
        if (restoreSelection && days.includes(prevVal)) {
          selectorSelect.value = prevVal;
        } else {
          selectorSelect.value = 'Senin';
        }
      } else if (viewMode === 'class') {
        selectorGroup.style.display = 'flex';
        selectorLabel.innerText = 'PILIH KELAS:';
        const classes = scheduleData[shift].classes;
        classes.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c;
          opt.textContent = c;
          selectorSelect.appendChild(opt);
        });
        if (restoreSelection && classes.includes(prevVal)) {
          selectorSelect.value = prevVal;
        } else {
          selectorSelect.value = classes[0];
        }
      } else {
        selectorGroup.style.display = 'none';
      }
    }

    // Render schedule container based on filters
    function render() {
      const shift = shiftModeSelect.value;
      const viewMode = viewModeSelect.value;
      const selection = selectorSelect.value;
      
      // Update header subtitle
      headerSubtitle.textContent = "JADWAL PELAJARAN SEMESTER GANJIL 2025 / 2026 (SHIFT " + shift.toUpperCase() + ")";
      
      if (viewMode === 'day') {
        renderDayView(shift, selection);
      } else if (viewMode === 'class') {
        renderClassView(shift, selection);
      } else if (viewMode === 'piket') {
        renderPiketView(shift);
      }
    }

    function renderDayView(shift, day) {
      const classes = scheduleData[shift].classes;
      const rows = scheduleData[shift].schedule[day];
      
      // Desktop Table
      let tableHtml = `
        <table class="day-view-table">
          <caption>Jadwal Hari ${day}</caption>
          <thead>
            <tr>
              <th style="width: 80px;">Jam Ke-</th>
              <th style="width: 110px;">Waktu</th>
              ${classes.map(c => "<th>" + c + "</th>").join('')}
            </tr>
          </thead>
          <tbody>
      `;
      
      rows.forEach(row => {
        if (row.isEvent) {
          tableHtml += `
            <tr class="break-row">
              <td colspan="${classes.length + 2}">${row.text} (${row.time})</td>
            </tr>
          `;
        } else {
          tableHtml += `
            <tr>
              <th>${row.period}</th>
              <td>${row.time}</td>
              ${classes.map(c => {
                const code = row.cells[c] || '';
                return '<td data-code="' + code + '">' + code + '</td>';
              }).join('')}
            </tr>
          `;
        }
      });
      
      tableHtml += `
          </tbody>
        </table>
      `;
      
      // Mobile Cards
      let cardsHtml = `<div class="schedule-cards">`;
      classes.forEach(c => {
        cardsHtml += `
          <div class="class-card">
            <h3>Kelas ${c}</h3>
        `;
        
        rows.forEach(row => {
          if (row.isEvent) {
            cardsHtml += `
              <div class="card-period break-period" style="background-color: var(--break-bg); color: var(--break-text); font-weight: bold; font-style: italic; padding: 8px; border-radius: 2px; margin: 6px 0; text-align: center; border: 1px solid var(--border-color);">
                ${row.text} (${row.time})
              </div>
            `;
          } else {
            const code = row.cells[c] || '';
            const t = scheduleData.teachers[code];
            if (code) {
              cardsHtml += `
                <div class="card-period" data-code="${code}">
                  <span class="card-period-time">Jam ${row.period} (${row.time})</span>
                  <span class="card-period-subject">
                    ${t ? t.subject : code}
                    <span class="card-period-teacher">${t ? t.name : ''}</span>
                  </span>
                </div>
              `;
            } else {
              cardsHtml += `
                <div class="card-period">
                  <span class="card-period-time" style="color: var(--text-muted);">Jam ${row.period} (${row.time})</span>
                  <span class="card-period-subject" style="color: var(--text-muted); font-style: italic;">Tidak Ada Kelas</span>
                </div>
              `;
            }
          }
        });
        
        cardsHtml += `</div>`;
      });
      cardsHtml += `</div>`;
      
      scheduleContainer.innerHTML = `<div class="table-wrapper">${tableHtml}</div>${cardsHtml}`;
    }

    function renderClassView(shift, className) {
      const schedule = scheduleData[shift].schedule;
      const days = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];
      
      let html = `
        <table class="class-view-table">
          <caption>Jadwal Kelas ${className}</caption>
          <thead>
            <tr>
              <th style="width: 100px;">Hari</th>
              <th style="width: 80px;">Jam Ke-</th>
              <th style="width: 120px;">Waktu</th>
              <th>Mata Pelajaran</th>
              <th>Guru</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      days.forEach(day => {
        const dayRows = schedule[day];
        dayRows.forEach((row, rIdx) => {
          const isFirst = rIdx === 0;
          const dayHeaderHtml = isFirst ? `<th class="day-header" rowspan="${dayRows.length}">${day}</th>` : '';
          
          if (row.isEvent) {
            html += `
              <tr class="break-row">
                ${dayHeaderHtml}
                <td colspan="4">${row.text} (${row.time})</td>
              </tr>
            `;
          } else {
            const code = row.cells[className] || '';
            const t = scheduleData.teachers[code];
            html += `
              <tr>
                ${dayHeaderHtml}
                <td>${row.period}</td>
                <td>${row.time}</td>
                <td style="font-weight: 600;">${t ? t.subject : (code || '-')}</td>
                <td>${t ? t.name : '-'}</td>
              </tr>
            `;
          }
        });
      });
      
      html += `
          </tbody>
        </table>
      `;
      
      scheduleContainer.innerHTML = `<div class="table-wrapper">${html}</div>`;
    }

    function renderPiketView(shift) {
      const piket = scheduleData.piket[shift];
      
      let html = `
        <table class="piket-table">
          <caption>Jadwal Piket Guru & Staff - Shift ${shift === 'pagi' ? 'Pagi' : 'Siang'}</caption>
          <thead>
            <tr>
              <th style="width: 180px;">Petugas Piket</th>
              <th>Senin</th>
              <th>Selasa</th>
              <th>Rabu</th>
              <th>Kamis</th>
              <th>Jumat</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>Piket Guru</th>
              <td>${piket.guru.Senin.join('<br>')}</td>
              <td>${piket.guru.Selasa.join('<br>')}</td>
              <td>${piket.guru.Rabu.join('<br>')}</td>
              <td>${piket.guru.Kamis.join('<br>')}</td>
              <td>${piket.guru.Jumat.join('<br>')}</td>
            </tr>
            <tr>
              <th>Wakasek & Staff</th>
              <td>${piket.wakasek.Senin.join('<br>')}</td>
              <td>${piket.wakasek.Selasa.join('<br>')}</td>
              <td>${piket.wakasek.Rabu.join('<br>')}</td>
              <td>${piket.wakasek.Kamis.join('<br>')}</td>
              <td>${piket.wakasek.Jumat.join('<br>')}</td>
            </tr>
            <tr>
              <th>Guru BK</th>
              <td>${piket.bk.Senin.join('<br>')}</td>
              <td>${piket.bk.Selasa.join('<br>')}</td>
              <td>${piket.bk.Rabu.join('<br>')}</td>
              <td>${piket.bk.Kamis.join('<br>')}</td>
              <td>${piket.bk.Jumat.join('<br>')}</td>
            </tr>
          </tbody>
        </table>
      `;
      
      scheduleContainer.innerHTML = `<div class="table-wrapper">${html}</div>`;
    }

    // Events
    shiftModeSelect.addEventListener('change', () => {
      populateSelector(false);
      render();
    });

    viewModeSelect.addEventListener('change', () => {
      populateSelector(true);
      render();
    });

    selectorSelect.addEventListener('change', render);

    // Tooltip implementation for desktop hover
    document.addEventListener('mouseover', function(e) {
      const target = e.target.closest('td[data-code]');
      if (target) {
        const code = target.getAttribute('data-code');
        if (code && scheduleData.teachers[code]) {
          const t = scheduleData.teachers[code];
          tooltip.innerHTML = `<strong>${t.name}</strong><br>${t.subject}`;
          tooltip.style.display = 'block';
        }
      }
    });

    document.addEventListener('mousemove', function(e) {
      if (tooltip.style.display === 'block') {
        const xOffset = e.pageX + 15;
        const yOffset = e.pageY + 15;
        tooltip.style.left = xOffset + 'px';
        tooltip.style.top = yOffset + 'px';
      }
    });

    document.addEventListener('mouseout', function(e) {
      const target = e.target.closest('td[data-code]');
      if (target) {
        tooltip.style.display = 'none';
      }
    });

    // Initialize
    populateSelector();
    render();
  </script>
</body>
</html>
